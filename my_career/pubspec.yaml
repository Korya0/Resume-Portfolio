name: my_career
description: "MY CAREER - Flutter Learning Roadmap Tracker"
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  go_router: ^17.1.0
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  json_annotation: ^4.11.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.9.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DM_Sans/DMSans-Regular.ttf
        - asset: assets/fonts/DM_Sans/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DM_Sans/DMSans-Bold.ttf
          weight: 700
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/Space_Mono/SpaceMono-Regular.ttf
        - asset: assets/fonts/Space_Mono/SpaceMono-Bold.ttf
          weight: 700
